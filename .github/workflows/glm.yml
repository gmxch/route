name: OCR glm

on:
  workflow_dispatch: 

jobs:
  run-ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flask requests pyngrok

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          sleep 10
          
          echo "Downloading GLM-OCR model..."
          ollama pull glm-ocr

      - name: Start Worker
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTH }}
          API0_URL: ${{ secrets.URL0 }}
          API0_KEY: ${{ secrets.KEY0 }}
        run: |
          ngrok config add-authtoken $NGROK_AUTH
          
          nohup python glm.py & 
          
          nohup ngrok http 5000 > ngrok.log 2>&1 &
          
          sleep 15
          
          URL=$(curl -s localhost:4040/api/tunnels | jq -r .tunnels[0].public_url)
          
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "FAILED: Ngrok tunnel not found. Check ngrok.log"
            cat ngrok.log
            exit 1
          fi
          
          echo "OCR Node URL: $URL"
          
          # 6. Lapor ke API0 (Railway)
          curl -X POST $API0_URL \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"$URL\", \"secret\": \"$API0_KEY\"}"
          
          echo "Worker is registered. Standing by for tasks..."
          while true; do sleep 60; done
          